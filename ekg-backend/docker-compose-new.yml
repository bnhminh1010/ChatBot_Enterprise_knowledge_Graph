version: "3.9"
services:
  neo4j:
    image: neo4j:5.23
    container_name: ekg-neo4j-new
    ports:
      - "7474:7474"  # Neo4j Browser (UI)
      - "7687:7687"  # Bolt (driver connection)
    environment:
      NEO4J_AUTH: myuser/mypassword123
      NEO4JLABS_APOC: "true"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - ./neo4j-new/data:/data
      - ./neo4j-new/import:/var/lib/neo4j/import